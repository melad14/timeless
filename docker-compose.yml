version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: timeless_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: timeless_api
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: timeless
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-must-be-32-char}
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
    driver: local
