version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: timeless_db
    environment:
      POSTGRES_USER: timeless_user
      POSTGRES_PASSWORD: timeless_password
      POSTGRES_DB: timeless_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeless_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: .
    container_name: timeless_api
    environment:
      DATABASE_URL: postgresql://timeless_user:timeless_password@db:5432/timeless_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-must-be-32-char}
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
